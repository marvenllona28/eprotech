<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EITS Customer Portal</title>

  <link rel="stylesheet" href="portal.css">

</head>

<body>

  <div class="container">

    <div class="portal-card">

      <h1>E-protech IT Solutions</h1>

      <p class="subtitle">
        Customer Portal
      </p>

      <!-- LOGIN -->

      <div id="loginBox">

        <input
          type="email"
          id="email"
          placeholder="Email Address"
        >

        <input
          type="password"
          id="password"
          placeholder="Password"
        >

        <button onclick="login()">
          Login
        </button>

        <button class="secondary" onclick="register()">
          Register
        </button>

      </div>

      <!-- DASHBOARD -->

      <div id="dashboard" class="hidden">

        <h2>Welcome</h2>

        <p id="userEmail"></p>

        <div class="dashboard-grid">

          <div class="dashboard-card">

            <h3>Internet Plan</h3>

            <p>30 Mbps Unlimited</p>

          </div>

          <div class="dashboard-card">

            <h3>Status</h3>

            <p class="online">
              ACTIVE
            </p>

          </div>

          <div class="dashboard-card">

            <h3>Billing</h3>

            <p>₱900 / Month</p>

          </div>

          <div class="dashboard-card">

            <h3>Support</h3>

            <textarea
              id="ticketMessage"
              placeholder="Describe your concern..."
            ></textarea>

            <button onclick="submitTicket()">
              Submit Ticket
            </button>

          </div>

        </div>

        <button class="logout" onclick="logout()">
          Logout
        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module" src="portal.js"></script>

</body>

</html>
